name: Gipet
options:
  bundleIdPrefix: com.gipet
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  Gipet:
    type: application
    platform: macOS
    deploymentTarget: "13.0"

    sources:
      - path: Sources/DesktopDog
      - path: Sources/DesktopDog/Assets.xcassets
        excludes:
          - "**/.DS_Store"
          - Resources/**   # resources added separately below

    postCompileScripts:
      - name: Copy App Resources
        script: |
          RES="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources"
          mkdir -p "$RES"
          cp -f  "${SRCROOT}/Sources/DesktopDog/Resources/AppIcon.icns" "$RES/"
          cp -rf "${SRCROOT}/Sources/DesktopDog/Resources/Memes" "$RES/"
          cp -rf "${SRCROOT}/Sources/DesktopDog/Resources/Notes" "$RES/"

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gipet.app
        PRODUCT_NAME: Gipet
        INFOPLIST_FILE: Gipet-Info.plist
        CODE_SIGN_ENTITLEMENTS: Gipet.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "3"
        # Carbon for RegisterEventHotKey
        OTHER_LDFLAGS: "-framework Carbon"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # MAS code signing
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        DEVELOPMENT_TEAM: "WN99FPJ6HV"
        PROVISIONING_PROFILE_SPECIFIER: "Gipet Mac App Store"   # ← Apple Developer에서 생성 후 이름 확인

    dependencies:
      - package: lottie-spm
        product: Lottie

    preBuildScripts:
      - name: Check Secrets
        script: |
          if [ -z "${GIPET_GITHUB_CLIENT_SECRET}" ]; then
            echo "warning: GIPET_GITHUB_CLIENT_SECRET not set — OAuth will not work"
          fi

packages:
  lottie-spm:
    url: https://github.com/airbnb/lottie-spm.git
    from: "4.4.0"
