name: Gipet
options:
  bundleIdPrefix: com.gipet
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  Gipet:
    type: application
    platform: macOS
    deploymentTarget: "13.0"

    sources:
      - path: Sources/DesktopDog
      - path: Sources/DesktopDog/Assets.xcassets
        excludes:
          - "**/.DS_Store"
          - Resources/**   # resources added separately below

    postCompileScripts:
      - name: Copy App Resources
        script: |
          RES="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources"
          mkdir -p "$RES"
          cp -f  "${SRCROOT}/Sources/DesktopDog/Resources/AppIcon.icns" "$RES/"
          cp -rf "${SRCROOT}/Sources/DesktopDog/Resources/Memes" "$RES/"
          cp -rf "${SRCROOT}/Sources/DesktopDog/Resources/Notes" "$RES/"

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gipet.app
        PRODUCT_NAME: Gipet
        INFOPLIST_FILE: Gipet-Info.plist
        CODE_SIGN_ENTITLEMENTS: Gipet.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.1"
        CURRENT_PROJECT_VERSION: "10"
        # Carbon for RegisterEventHotKey
        OTHER_LDFLAGS: "-framework Carbon"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: "WN99FPJ6HV"
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
          PROVISIONING_PROFILE_SPECIFIER: ""
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "Gipet Mac App Store"

    dependencies:
      - package: lottie-spm
        product: Lottie
      - package: SwiftGitX
        product: SwiftGitX

    preBuildScripts:
      - name: Check Secrets
        script: |
          if [ -z "${GIPET_GITHUB_CLIENT_SECRET}" ]; then
            echo "warning: GIPET_GITHUB_CLIENT_SECRET not set — OAuth will not work"
          fi

schemes:
  Gipet:
    build:
      targets:
        Gipet: all
    run:
      config: Debug
    archive:
      config: Release

schemes:
  gitdog:
    build:
      targets:
        Gipet: all
    run:
      config: Debug
    archive:
      config: Release

packages:
  lottie-spm:
    url: https://github.com/airbnb/lottie-spm.git
    from: "4.4.0"
  SwiftGitX:
    url: https://github.com/ibrahimcetin/SwiftGitX.git
    from: "0.4.0"
